# Workflows ejecutables — cada uno se traduce a slash-command/prompt por IDE
# 1 canónico (spec-build-verify) + 3 de negocio.
version: 2

workflows:
  - name: spec-build-verify
    kind: canonical
    title: OpenSpec Lifecycle (canonical)
    description: >-
      Ciclo maestro OpenSpec: intake → proposal → design → tasks → spec →
      implementación → tests → docs → archive.
    uses_agents: [spec, build, verify, docs, release]
    file: workflows/spec-build-verify.workflow.md

  - name: create-visual-agenda
    kind: business
    title: Crear agenda visual accesible
    description: >-
      Agenda visual con pictogramas ARASAAC reales, intake guiado, validación
      CAA/SAAC, revisión humana y exportación con manifest.
    uses_agents: [spec, build, verify, docs]
    uses_skills: [material-pipeline, arasaac-fetch, human-review-gate, export-with-manifest, compliance-scan, a11y-audit]
    file: workflows/create-visual-agenda.workflow.md

  - name: create-communication-board
    kind: business
    title: Crear tablero de comunicación
    description: >-
      Tablero de comunicación con categorías, pictogramas reales y balance
      CAA/SAAC. Revisión humana obligatoria antes de exportar.
    uses_agents: [spec, build, verify, docs]
    uses_skills: [material-pipeline, arasaac-fetch, human-review-gate, export-with-manifest, compliance-scan, a11y-audit]
    file: workflows/create-communication-board.workflow.md

  - name: create-easy-reading
    kind: business
    title: Crear documento en lectura fácil
    description: >-
      Adaptar documento a lectura fácil con apoyo pictográfico ARASAAC. Requiere
      revisión humana profesional y verifica plain-language.
    uses_agents: [spec, build, verify, docs]
    uses_skills: [material-pipeline, arasaac-fetch, human-review-gate, export-with-manifest, compliance-scan, a11y-audit]
    file: workflows/create-easy-reading.workflow.md
