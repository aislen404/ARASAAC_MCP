# Agentes-fase de ARASAAC Social MCP Platform
# 5 agentes = 5 fases del ciclo de vida OpenSpec → producción
# Cada agente invoca internamente N personas de dominio (ver personas.yaml)
version: 2

agents:
  - name: spec
    title: Spec Agent
    phase: spec
    description: >-
      Traduce necesidad social en change OpenSpec completa (proposal, design,
      tasks, spec). Aplica gates de compliance desde el diseño.
    invokes_personas:
      - product-owner-social
      - ngo-cee-domain
      - caasaac-methodology
      - a11y-cognitive
      - license-legal
      - privacy-ethics
      - arasaac-liaison
      - solution-architect
      - mcp-architect
      - openspec-steward
    uses_skills:
      - openspec-lifecycle
      - compliance-scan
    uses_workflows:
      - spec-build-verify
    mandatory_gates: [license, privacy, human_review]
    file: agents/spec.agent.md

  - name: build
    title: Build Agent
    phase: build
    description: >-
      Implementa una task atómica de OpenSpec. Detecta subsistema por globs de
      la task (backend/frontend/mcp/data/export) y aplica reglas de área.
    invokes_personas:
      - backend
      - frontend
      - mcp-architect
      - data-connector
      - semantic-search
      - export-document
      - devops
      - solution-architect
    uses_skills:
      - openspec-lifecycle
      - arasaac-fetch
      - mcp-tool-scaffold
      - material-pipeline
      - export-with-manifest
    uses_workflows:
      - spec-build-verify
    mandatory_gates: [license, privacy]
    file: agents/build.agent.md

  - name: verify
    title: Verify Agent
    phase: verify
    description: >-
      Ejecuta tests, lint, typecheck, axe, contratos visuales y los 3 gates
      críticos. Nada pasa a docs/release sin su OK.
    invokes_personas:
      - qa
      - accessibility-qa
      - test-automation
      - security
      - license-legal
      - privacy-ethics
      - observability
    uses_skills:
      - compliance-scan
      - a11y-audit
      - human-review-gate
    uses_workflows:
      - spec-build-verify
    mandatory_gates: [license, privacy, human_review]
    file: agents/verify.agent.md

  - name: docs
    title: Docs Agent
    phase: docs
    description: >-
      Genera y actualiza README, manuales técnicos, deployment, contribution,
      release notes, dossier ARASAAC y manuales de entidad.
    invokes_personas:
      - documentation
      - arasaac-liaison
      - easy-reading
      - ux-accessibility
      - a11y-cognitive
    uses_skills:
      - docs-generate
    uses_workflows:
      - spec-build-verify
    mandatory_gates: [license]
    file: agents/docs.agent.md

  - name: release
    title: Release Agent
    phase: release
    description: >-
      Archiva la change OpenSpec, publica release notes, actualiza changelog
      y regenera los packs multi-IDE.
    invokes_personas:
      - release-manager
      - openspec-steward
      - product-owner-social
      - devops
    uses_skills:
      - openspec-archive
      - docs-generate
    uses_workflows:
      - spec-build-verify
    mandatory_gates: [human_review]
    file: agents/release.agent.md
