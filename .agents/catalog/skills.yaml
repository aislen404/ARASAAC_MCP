# Skills reales (procedimiento paso a paso) — invocables desde agentes-fase
# Consolidación de las 69 skills legacy en 10 unidades ejecutables.
# Ver mapeo old→new en openspec/changes/0036-agent-system-refactor/design.md §3
version: 2

skills:
  - name: openspec-lifecycle
    description: Crear, validar y evolucionar una change OpenSpec (proposal, design, tasks, spec).
    directory: skills/openspec-lifecycle
    invoked_by_agents: [spec, build]
    gates: []

  - name: openspec-archive
    description: Cerrar tasks.md, mover a openspec/changes/archive/, actualizar índices y release notes.
    directory: skills/openspec-archive
    invoked_by_agents: [release]
    gates: []

  - name: arasaac-fetch
    description: Consultar API de ARASAAC, normalizar metadata, cachear y generar entrada de manifest.
    directory: skills/arasaac-fetch
    invoked_by_agents: [build]
    gates: [license]

  - name: mcp-tool-scaffold
    description: Definir schema MCP estricto, implementar tool con seguridad, escribir contract test y validación.
    directory: skills/mcp-tool-scaffold
    invoked_by_agents: [build]
    gates: []

  - name: material-pipeline
    description: >-
      Pipeline unificado de materiales: intake → search pictograms → edit →
      validate → human-review → export. Absorbe todas las skills create-* y editor-*.
    directory: skills/material-pipeline
    invoked_by_agents: [build]
    gates: [license, privacy, human_review]

  - name: export-with-manifest
    description: Generar HTML/PDF/DOCX/PPTX/ZIP con atribución visible y manifest ARASAAC completo.
    directory: skills/export-with-manifest
    invoked_by_agents: [build]
    gates: [license]

  - name: human-review-gate
    description: Solicitar, aprobar o rechazar revisión humana de un material con trazabilidad.
    directory: skills/human-review-gate
    invoked_by_agents: [verify]
    gates: [human_review]

  - name: compliance-scan
    description: >-
      Scan único que agrupa license + privacy + pictogram-ids + visual-density +
      plain-language + non-commercial-context. Reemplaza las 10 skills validate-*.
    directory: skills/compliance-scan
    invoked_by_agents: [spec, verify]
    gates: [license, privacy]

  - name: a11y-audit
    description: Auditoría WCAG 2.2 AA + keyboard + focus + color-independence + labels + cognitive.
    directory: skills/a11y-audit
    invoked_by_agents: [verify]
    gates: []

  - name: docs-generate
    description: >-
      Generar README, manuales técnicos, deployment, contribution, release notes,
      dossier ARASAAC y manuales de entidad. Reemplaza las 7 skills docs-generate-*.
    directory: skills/docs-generate
    invoked_by_agents: [docs, release]
    gates: []
