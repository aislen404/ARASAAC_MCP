services:
  db:
    image: pgvector/pgvector:pg17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: arasaac_mvp
      POSTGRES_USER: arasaac
      POSTGRES_PASSWORD: local-development-only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U arasaac -d arasaac_mvp
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./services/api
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://arasaac:local-development-only@db:5432/arasaac_mvp
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_MODEL: ${AZURE_OPENAI_MODEL:-}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-20}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 3s
      retries: 3

  mcp:
    build:
      context: .
      dockerfile: services/mcp/Dockerfile
    ports:
      - "8003:8001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"
      interval: 10s
      timeout: 3s
      retries: 3

  web:
    build:
      context: ./apps/web
    environment:
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3002:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
