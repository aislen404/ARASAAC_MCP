services:
  api:
    build:
      context: ./services/api
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 3s
      retries: 3

  mcp:
    build:
      context: .
      dockerfile: services/mcp/Dockerfile
    ports:
      - "8001:8001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"
      interval: 10s
      timeout: 3s
      retries: 3

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
