name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: make setup
      - name: OpenSpec
        run: make openspec-verify
      - name: Agent packs
        run: make agent-packs-verify
      - name: Lint
        run: make lint
      - name: Types
        run: make typecheck
      - name: Tests and coverage
        run: make test
      - name: Production build
        run: npm --prefix apps/web run build
      - name: Dependency audit
        run: npm audit --prefix apps/web --audit-level=high
